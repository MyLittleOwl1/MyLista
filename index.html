<!DOCTYPE html>
<html lang="es" data-theme="dark">

<head>
    <meta charset="UTF-8" />
    <title>MyLista — Lista de la compra</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <meta name="theme-color" content="#0a0a0f" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="MyLista" />

    <link rel="stylesheet" href="styles.css" />
    <link rel="manifest" href="manifest.json" />
    <link rel="icon" href="icon.svg" type="image/svg+xml" />
    <link rel="apple-touch-icon" href="icon.svg" />

    <!-- Firebase SDKs -->
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>

    <script src="firebase-config.js"></script>
    <script defer src="app.js"></script>
</head>

<body>
    <!-- TOAST NOTIFICATIONS -->
    <div id="toastContainer" class="toast-container" role="status" aria-live="polite"></div>

    <header class="app-header">
        <div class="header-inner">
            <h1 class="app-title">
                <span class="app-icon">📋</span>
                MyLista
            </h1>
            <button id="themeToggle" class="theme-toggle" aria-label="Cambiar tema">
                <span class="icon-sun">☀️</span>
                <span class="icon-moon">🌙</span>
            </button>
        </div>
        <p class="app-subtitle">Lista de la compra</p>
    </header>

    <!-- AUTENTICACIÓN -->
    <section id="authSection" class="auth-section">
        <div class="auth-card">
            <div class="auth-icon">🛒</div>
            <h2>Bienvenido</h2>
            <p class="auth-desc">Inicia sesión para gestionar tus listas</p>

            <div class="auth-input-group">
                <input type="email" id="emailInput" placeholder="Correo electrónico" autocomplete="email" />
            </div>
            <div class="auth-input-group">
                <input type="password" id="passwordInput" placeholder="Contraseña" autocomplete="current-password" />
            </div>

            <button id="loginBtn" class="btn-primary">Entrar</button>
            <button id="registerBtn" class="btn-secondary">Crear cuenta</button>
        </div>
    </section>

    <!-- APP PRINCIPAL -->
    <main class="app-main" id="appMain">
        <!-- Barra superior de controles -->
        <section class="controls-bar">
            <div class="date-picker-group">
                <label for="dateInput" class="date-label">📅 Fecha</label>
                <input type="date" id="dateInput" />
            </div>
            <div class="controls-actions">
                <button id="loadListBtn" class="btn-outline">Cargar lista</button>
                <button id="catalogMgrBtn" class="btn-icon" aria-label="Gestionar catálogo" title="Gestionar catálogo">📦</button>
                <button id="logoutBtn" class="btn-icon logout" aria-label="Cerrar sesión" title="Cerrar sesión">🚪</button>
            </div>
        </section>

        <!-- Lista -->
        <section class="list-section" id="listSection">
            <div class="list-header">
                <h2 id="currentDateTitle">Sin fecha seleccionada</h2>
                <span id="itemCount" class="item-count">0 artículos</span>
            </div>

            <div class="quick-add">
                <select id="quickAddSelect" aria-label="Añadir producto del catálogo">
                    <option value="">➕ Añadir desde catálogo...</option>
                </select>
            </div>

            <div id="itemsContainer" class="items-container">
                <!-- Los artículos se renderizan aquí -->
            </div>

            <div class="empty-state" id="emptyState">
                <div class="empty-icon">📝</div>
                <p class="empty-text">Añade artículos a tu lista</p>
                <p class="empty-hint">Pulsa el botón + para empezar</p>
            </div>

            <div class="actions-bar">
                <button id="addItemBtn" class="btn-fab" aria-label="Añadir artículo">
                    <span class="fab-icon">+</span>
                    <span class="fab-label">Añadir</span>
                </button>
                <button id="saveListBtn" class="btn-primary">
                    💾 Guardar lista
                </button>
            </div>
        </section>
    </main>

    <!-- Indicador de carga -->
    <div id="loadingOverlay" class="loading-overlay" style="display:none">
        <div class="loading-spinner"></div>
    </div>

    <!-- Modal de catálogo (selector y gestor) -->
    <div id="catalogModal" class="modal-overlay" style="display:none">
        <div class="modal-container">
            <div class="modal-header">
                <h3 id="catalogModalTitle">Catálogo</h3>
                <button id="catalogModalClose" class="modal-close-btn" aria-label="Cerrar">✕</button>
            </div>
            <input type="text" id="catalogModalSearch" class="modal-search-input" placeholder="Buscar productos..." autocomplete="off" />
            <div id="catalogModalList" class="modal-list"></div>
        </div>
    </div>
</body>

</html>
